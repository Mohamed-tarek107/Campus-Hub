<div class="page-wrapper">

  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="content">

    <!-- Header -->
    <div class="header">
      <div class="brand-icon">Z</div>
      <div>
        <h1 *ngIf="!isEditMode">Choose Your Doctors</h1>
        <h1 *ngIf="isEditMode">Edit Your Doctors</h1>
        <p *ngIf="!isEditMode">Select a doctor, day, and time for each of your courses.</p>
        <p *ngIf="isEditMode">Update any of your current doctor selections.</p>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-row">
      <div class="progress-track">
        <div class="progress-fill" [style.width.%]="progressPercent"></div>
      </div>
      <span class="progress-text">{{ completedCount }} / {{ selections.length }}</span>
    </div>

    <!-- Rows -->
    <div class="rows">
      <div class="row" *ngFor="let sel of selections; let i = index" [class.done]="isRowComplete(i)">

        <div class="row-left">
          <span class="row-num" [class.done]="isRowComplete(i)">
            <svg *ngIf="isRowComplete(i)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span *ngIf="!isRowComplete(i)">{{ i + 1 }}</span>
          </span>
          <span class="course-label">{{ sel.course_name }}</span>
        </div>

        <div class="row-fields">

          <div class="select-wrap">
            <select [(ngModel)]="sel.doctor_name" (change)="onFieldChange()" [disabled]="isLoading">
              <option value="" disabled>Doctor</option>
              <option *ngFor="let d of sel.doctors" [value]="d.name">{{ d.name }}</option>
            </select>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>

          <div class="select-wrap">
            <select [(ngModel)]="sel.day" (change)="onFieldChange()" [disabled]="!sel.doctor_name">
              <option value="" disabled>Day</option>
              <option *ngFor="let d of validDays" [value]="d">{{ d | titlecase }}</option>
            </select>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>

          <div class="select-wrap">
            <select [(ngModel)]="sel.timeslot" (change)="onFieldChange()" [disabled]="!sel.day">
              <option value="" disabled>Time</option>
              <option *ngFor="let t of validTimeSlots" [value]="t">{{ t }}</option>
            </select>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>

        </div>

      </div>
    </div>

    <!-- Error -->
    <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

    <!-- Submit -->
    <div class="submit-row">
      <button class="btn-submit" (click)="onSubmit()" [disabled]="!allComplete || isLoading">
        <span *ngIf="!isLoading && !isEditMode">Confirm</span>
        <span *ngIf="!isLoading && isEditMode">Save Changes</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
      <p class="submit-hint" *ngIf="!allComplete">Fill all rows to continue</p>
    </div>

  </div>
</div>
