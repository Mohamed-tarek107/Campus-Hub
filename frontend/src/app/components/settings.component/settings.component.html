<div class="layout">
  <app-sidenav></app-sidenav>

  <div class="main">
    <app-topnav></app-topnav>

    <div class="page">

      <div class="page-header">
        <h1>Settings</h1>
        <p>Manage your account information and password.</p>
      </div>

      <!-- Success / Error -->
      <div class="alert success" *ngIf="successMsg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        {{ successMsg }}
      </div>
      <div class="alert error" *ngIf="errorMsg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMsg }}
      </div>

      <div class="sections">

        <!-- Profile Info -->
        <div class="section-card">
          <h2 class="section-title">Profile Information</h2>

          <div class="fields">
            <div class="field">
              <label>Username</label>
              <input type="text" [(ngModel)]="profileForm.username" placeholder="Your username" />
            </div>
            <div class="field">
              <label>Phone Number</label>
              <input type="text" [(ngModel)]="profileForm.phone_number" placeholder="Your phone number" />
            </div>
            <div class="field">
              <label>Department</label>
              <div class="select-wrap">
                <select [(ngModel)]="profileForm.department">
                  <option value="bis">BIS</option>
                  <option value="fmi">FMI</option>
                </select>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </div>
            </div>
            <div class="field">
              <label>Year</label>
              <div class="select-wrap">
                <select [(ngModel)]="profileForm.year">
                  <option [value]="1">Year 1</option>
                  <option [value]="2">Year 2</option>
                  <option [value]="3">Year 3</option>
                  <option [value]="4">Year 4</option>
                </select>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </div>
            </div>
            <div class="field full-width">
              <label>Bio</label>
              <textarea [(ngModel)]="profileForm.bio" rows="3" placeholder="A short bio..."></textarea>
            </div>
          </div>

          <div class="section-footer">
            <button class="btn-save" (click)="onSaveProfile()" [disabled]="isLoadingProfile">
              <span *ngIf="!isLoadingProfile">Save Changes</span>
              <span *ngIf="isLoadingProfile" class="spinner"></span>
            </button>
          </div>
        </div>

        <!-- Change Password -->
        <div class="section-card">
          <h2 class="section-title">Change Password</h2>

          <div class="fields">
            <div class="field full-width">
              <label>Current Password</label>
              <div class="input-wrap">
                <input
                  [type]="showCurrentPass ? 'text' : 'password'"
                  [(ngModel)]="passwordForm.currentPassword"
                  placeholder="Enter current password"
                />
                <button class="eye-btn" (click)="showCurrentPass = !showCurrentPass">
                  <svg *ngIf="!showCurrentPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                  <svg *ngIf="showCurrentPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="field">
              <label>New Password</label>
              <div class="input-wrap">
                <input
                  [type]="showNewPass ? 'text' : 'password'"
                  [(ngModel)]="passwordForm.newPassword"
                  placeholder="Enter new password"
                />
                <button class="eye-btn" (click)="showNewPass = !showNewPass">
                  <svg *ngIf="!showNewPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                  <svg *ngIf="showNewPass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="field">
              <label>Confirm New Password</label>
              <input
                type="password"
                [(ngModel)]="passwordForm.confirmPassword"
                placeholder="Confirm new password"
              />
            </div>
          </div>

          <div class="section-footer">
            <button class="btn-save" (click)="onChangePassword()" [disabled]="isLoadingPassword">
              <span *ngIf="!isLoadingPassword">Update Password</span>
              <span *ngIf="isLoadingPassword" class="spinner"></span>
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
