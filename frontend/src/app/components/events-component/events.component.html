<div class="layout">
  <app-sidenav></app-sidenav>

  <div class="main">
    <app-topnav></app-topnav>

    <div class="page">

      <!-- Header -->
      <div class="page-header">
        <div>
          <h1>Events</h1>
          <p>Upcoming events at your university.</p>
        </div>
        <div class="count-badge">
          <span class="count-value">{{ events.length }}</span>
          <span class="count-label">Events</span>
        </div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" *ngIf="events.length === 0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <p>No upcoming events</p>
        <span>Check back soon for new events.</span>
      </div>

      <!-- Events grid -->
      <div class="events-grid" *ngIf="events.length > 0">
        <div class="event-card" *ngFor="let e of events">

          <div class="event-header">
            <h3 class="event-title">{{ e.title }}</h3>
            <span class="event-host">{{ e.host }}</span>
          </div>

          <p class="event-description">{{ e.description }}</p>

          <div class="event-footer">
            <div class="event-detail">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <span>{{ e.date }}</span>
            </div>
            <div class="event-detail">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              <span>{{ e.location }}</span>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
